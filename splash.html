<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MedChifa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(180deg, #6ff36b 0%, #4a55ec 100%) no-repeat fixed;
   
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .splash-container {
            text-align: center;
            color: white;
        }

        /* 🔥 LOGO */
        .logo {
            width: 220px;
            max-width: 60vw;
            margin-bottom: 20px;
            animation: pulseGlow 2.2s infinite ease-in-out;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.9));
        }

     .app-name {
    font-size: 20px;
    font-weight: 600;
    color: #02023b; /* 🔵 bleu nuit */
    margin-bottom: 6px;
    animation: textPulse 2.2s infinite ease-in-out;
    text-shadow: 
        0 0 8px rgba(255,255,255,0.6),
        0 0 14px rgba(255, 255, 255, 0.737);
}

       .app-desc {
    font-size: 15px;
    color: #02023b; /* 🔵 bleu nuit أفتح */
    margin-bottom: 18px;
    animation: textPulse 2.2s infinite ease-in-out;
    animation-delay: 0.1s;
    text-shadow:
        0 0 6px rgba(255,255,255,0.5),
        0 0 10px rgba(255,255,255,0.8);
}

        /* ⏳ LOADING DOTS */
        .loading {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: rgb(247, 247, 247);
            border-radius: 50%;
            opacity: 0.2;
            animation: dotPulse 1.9s infinite ease-in-out;
            box-shadow: 0 0 10px rgba(255,255,255,0.9);
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% {
                opacity: 0.2;
            }
            40% {
                opacity: 1;
            }
        }

        /* 🔥 LOGO PULSE */
        @keyframes pulseGlow {
            0% {
                transform: scale(1);
                filter: drop-shadow(0 0 14px rgba(255,255,255,0.6));
            }
            50% {
                transform: scale(1.07);
                filter: drop-shadow(0 0 28px rgba(255,255,255,1));
            }
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 14px rgba(255,255,255,0.6));
            }
        }
        @keyframes textPulse {
    0% {
        transform: scale(1);
        opacity: 0.85;
    }
    50% {
        transform: scale(1.05);
        opacity: 1;
    }
    100% {
        transform: scale(1);
        opacity: 0.85;
    }
}
    </style>
</head>

<body>

    <div class="splash-container">
        <img src="medchifagz.png" class="logo" alt="MedChifa Logo">
<div class="app-name">MedChifa</div>
<div class="app-desc">Application de santé intelligente</div>

        <!-- ⏳ Loading dots -->
        <div class="loading">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- ⏭️ AUTO REDIRECT -->
    <script>
        setTimeout(() => {
            window.location.href = "login.html";
        }, 3000); // 3 ثواني
    </script>

</body>
</html>
