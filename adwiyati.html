<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أدويتي — MedChifaGiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       ADWIYATI SECTION — SCOPED STYLES
       All selectors prefixed with .adwiyati-root to prevent leaking
       ============================================================ */
    :root {
      --aw-cyan:    #00f5ff;
      --aw-green:   #00ff88;
      --aw-teal:    #00d4aa;
      --aw-bg:      #040d14;
      --aw-card:    rgba(0,220,255,0.05);
      --aw-border:  rgba(0,245,255,0.15);
      --aw-glow1:   rgba(0,245,255,0.35);
      --aw-glow2:   rgba(0,255,136,0.25);
      --aw-text:    #c8f4ff;
      --aw-muted:   rgba(200,244,255,0.5);
      --aw-danger:  #ff4d6d;
      --aw-warn:    #ffb347;
      --aw-radius:  16px;
      --aw-radius-sm: 10px;
    }

    /* ——— Page scaffold (demo only — remove in final integration) ——— */
    body {
      margin: 0; padding: 0;
      background: var(--aw-bg);
      font-family: 'Cairo', sans-serif;
      color: var(--aw-text);
      min-height: 100vh;
    }

    /* ============================================================
       ROOT CONTAINER
       ============================================================ */
    .adwiyati-root {
      position: relative;
      min-height: 100vh;
      padding: 0 0 100px 0;
      overflow-x: hidden;
    }

    /* Animated background mesh */
    .adwiyati-root::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,245,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(0,255,136,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,180,200,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: aw-bg-shift 12s ease-in-out infinite alternate;
    }

    @keyframes aw-bg-shift {
      from { opacity: 0.7; }
      to   { opacity: 1; }
    }

    .adwiyati-root > * { position: relative; z-index: 1; }

    /* ============================================================
       HEADER
       ============================================================ */
    .aw-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 20px 10px;
    }

    .aw-header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .aw-header-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--aw-cyan), var(--aw-green));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 18px var(--aw-glow1);
      animation: aw-pulse-icon 3s ease-in-out infinite;
    }

    @keyframes aw-pulse-icon {
      0%,100% { box-shadow: 0 0 18px var(--aw-glow1); }
      50%      { box-shadow: 0 0 32px var(--aw-glow1), 0 0 60px rgba(0,245,255,0.15); }
    }

    .aw-header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--aw-cyan), var(--aw-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .aw-header-sub {
      font-size: 11px;
      color: var(--aw-muted);
      margin: 0;
      font-weight: 300;
    }

    .aw-time-badge {
      background: var(--aw-card);
      border: 1px solid var(--aw-border);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: 'Rajdhani', monospace;
      font-size: 15px;
      color: var(--aw-cyan);
      letter-spacing: 2px;
      backdrop-filter: blur(10px);
      text-shadow: 0 0 10px var(--aw-cyan);
    }

    /* ============================================================
       NEXT DOSE CARD
       ============================================================ */
    .aw-section { padding: 10px 16px 0; }

    .aw-section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--aw-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .aw-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--aw-border), transparent);
    }

    .aw-next-card {
      background: linear-gradient(135deg,
        rgba(0,245,255,0.08),
        rgba(0,255,136,0.05));
      border: 1px solid var(--aw-border);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 30px rgba(0,245,255,0.08),
        inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .aw-next-card::before {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,245,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .aw-next-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .aw-next-med-name {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      margin: 0 0 4px;
      text-shadow: 0 0 20px var(--aw-glow1);
    }

    .aw-next-med-dose {
      font-size: 13px;
      color: var(--aw-green);
      font-weight: 600;
    }

    .aw-next-time-bubble {
      background: linear-gradient(135deg, var(--aw-cyan), var(--aw-teal));
      border-radius: 14px;
      padding: 8px 14px;
      text-align: center;
      box-shadow: 0 0 20px var(--aw-glow1);
    }

    .aw-next-time-bubble .time {
      font-family: 'Rajdhani', monospace;
      font-size: 20px;
      font-weight: 700;
      color: #001a22;
      display: block;
      letter-spacing: 2px;
    }

    .aw-next-time-bubble .lbl {
      font-size: 10px;
      color: rgba(0,26,34,0.8);
      font-weight: 600;
    }

    /* Countdown */
    .aw-countdown {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .aw-countdown-label {
      font-size: 12px;
      color: var(--aw-muted);
    }

    .aw-countdown-value {
      font-family: 'Rajdhani', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--aw-cyan);
      text-shadow: 0 0 15px var(--aw-glow1);
      letter-spacing: 1px;
    }

    /* Progress bar */
    .aw-progress-track {
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      overflow: hidden;
    }

    .aw-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--aw-cyan), var(--aw-green));
      border-radius: 10px;
      box-shadow: 0 0 10px var(--aw-glow1);
      transition: width 1s linear;
    }

    .aw-status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
    }

    .aw-status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--aw-green);
      box-shadow: 0 0 8px var(--aw-green);
      animation: aw-blink 1.5s ease-in-out infinite;
    }

    @keyframes aw-blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .aw-status-text {
      font-size: 12px;
      color: var(--aw-green);
    }

    /* "No next dose" empty state */
    .aw-no-next {
      text-align: center;
      padding: 24px 0 10px;
      color: var(--aw-muted);
      font-size: 14px;
    }

    .aw-no-next-icon { font-size: 36px; display: block; margin-bottom: 8px; }

    /* ============================================================
       MED LIST
       ============================================================ */
    .aw-med-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 2px;
    }

    .aw-med-card {
      background: var(--aw-card);
      border: 1px solid var(--aw-border);
      border-radius: var(--aw-radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .aw-med-card:hover {
      border-color: rgba(0,245,255,0.35);
      box-shadow: 0 0 20px rgba(0,245,255,0.1);
    }

    .aw-med-card.taken {
      border-color: rgba(0,255,136,0.2);
      opacity: 0.65;
    }

    .aw-med-card.upcoming {
      border-color: rgba(0,245,255,0.25);
      box-shadow: 0 0 15px rgba(0,245,255,0.07);
    }

    .aw-med-icon-wrap {
      width: 46px; height: 46px;
      min-width: 46px;
      background: linear-gradient(135deg, rgba(0,245,255,0.15), rgba(0,255,136,0.1));
      border: 1px solid rgba(0,245,255,0.25);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      position: relative;
    }

    .aw-med-badge {
      position: absolute;
      top: -4px; left: -4px;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      font-weight: 900;
    }

    .aw-med-badge.taken   { background: var(--aw-green); color: #001a22; }
    .aw-med-badge.missed  { background: var(--aw-danger); color: #fff; }
    .aw-med-badge.pending { background: var(--aw-cyan);   color: #001a22; }

    .aw-med-info { flex: 1; min-width: 0; }

    .aw-med-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin: 0 0 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .aw-med-dose {
      font-size: 12px;
      color: var(--aw-muted);
    }

    .aw-med-time-col {
      text-align: left;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .aw-med-time {
      font-family: 'Rajdhani', monospace;
      font-size: 17px;
      font-weight: 700;
      color: var(--aw-cyan);
      letter-spacing: 1px;
    }

    .aw-med-status-chip {
      font-size: 10px;
      font-weight: 700;
      border-radius: 20px;
      padding: 2px 9px;
      letter-spacing: 0.5px;
    }

    .chip-taken   { background: rgba(0,255,136,0.15); color: var(--aw-green); border: 1px solid rgba(0,255,136,0.3); }
    .chip-pending { background: rgba(0,245,255,0.12); color: var(--aw-cyan);  border: 1px solid rgba(0,245,255,0.3); }
    .chip-missed  { background: rgba(255,77,109,0.12); color: var(--aw-danger); border: 1px solid rgba(255,77,109,0.3); }

    /* Swipe-reveal delete */
    .aw-med-delete-btn {
      background: none;
      border: none;
      color: var(--aw-danger);
      font-size: 17px;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.2s;
      opacity: 0.5;
    }

    .aw-med-delete-btn:hover { background: rgba(255,77,109,0.1); opacity: 1; }

    /* ============================================================
       ADD MED FAB
       ============================================================ */
    .aw-fab {
      position: fixed;
      bottom: 90px;
      left: 20px;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--aw-cyan), var(--aw-green));
      border: none;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      color: #001a22;
      cursor: pointer;
      box-shadow:
        0 0 25px var(--aw-glow1),
        0 8px 20px rgba(0,0,0,0.4);
      z-index: 50;
      animation: aw-fab-glow 3s ease-in-out infinite;
      transition: transform 0.2s;
    }

    .aw-fab:hover  { transform: scale(1.07); }
    .aw-fab:active { transform: scale(0.95); }

    @keyframes aw-fab-glow {
      0%,100% { box-shadow: 0 0 25px var(--aw-glow1), 0 8px 20px rgba(0,0,0,0.4); }
      50%      { box-shadow: 0 0 40px var(--aw-glow1), 0 8px 30px rgba(0,0,0,0.5); }
    }

    /* ============================================================
       MODAL BASE
       ============================================================ */
    .aw-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,8,15,0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .aw-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .aw-modal {
      background: linear-gradient(160deg, #081520, #040d14);
      border: 1px solid var(--aw-border);
      border-radius: 28px 28px 0 0;
      padding: 20px 20px 40px;
      width: 100%;
      max-width: 480px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34,1.3,0.64,1);
      box-shadow:
        0 -10px 60px rgba(0,245,255,0.12),
        inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .aw-overlay.open .aw-modal {
      transform: translateY(0);
    }

    .aw-modal-handle {
      width: 40px; height: 4px;
      background: var(--aw-border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .aw-modal-title {
      font-size: 19px;
      font-weight: 900;
      color: #fff;
      margin: 0 0 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .aw-modal-title span {
      background: linear-gradient(90deg, var(--aw-cyan), var(--aw-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Form */
    .aw-form-group {
      margin-bottom: 16px;
    }

    .aw-form-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--aw-cyan);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    .aw-input {
      width: 100%;
      background: rgba(0,245,255,0.05);
      border: 1px solid var(--aw-border);
      border-radius: var(--aw-radius-sm);
      padding: 12px 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      color: #fff;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .aw-input:focus {
      border-color: var(--aw-cyan);
      box-shadow: 0 0 15px rgba(0,245,255,0.15);
    }

    .aw-input::placeholder { color: var(--aw-muted); }

    /* Time picker */
    .aw-time-picker-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .aw-time-input {
      flex: 1;
      background: rgba(0,245,255,0.05);
      border: 1px solid var(--aw-border);
      border-radius: var(--aw-radius-sm);
      padding: 12px 14px;
      font-family: 'Rajdhani', monospace;
      font-size: 26px;
      font-weight: 700;
      color: var(--aw-cyan);
      letter-spacing: 3px;
      text-align: center;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-shadow: 0 0 15px var(--aw-glow1);
    }

    .aw-time-input:focus {
      border-color: var(--aw-cyan);
      box-shadow: 0 0 20px rgba(0,245,255,0.2);
    }

    .aw-quick-times {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .aw-quick-time-btn {
      background: rgba(0,245,255,0.07);
      border: 1px solid var(--aw-border);
      border-radius: 20px;
      padding: 5px 12px;
      font-family: 'Rajdhani', monospace;
      font-size: 13px;
      color: var(--aw-cyan);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .aw-quick-time-btn:hover {
      background: rgba(0,245,255,0.15);
      border-color: var(--aw-cyan);
    }

    /* Submit */
    .aw-submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--aw-cyan), var(--aw-green));
      border: none;
      border-radius: var(--aw-radius);
      padding: 15px;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #001a22;
      cursor: pointer;
      margin-top: 6px;
      letter-spacing: 0.5px;
      box-shadow: 0 0 25px var(--aw-glow2);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .aw-submit-btn:hover  { transform: translateY(-1px); box-shadow: 0 0 35px var(--aw-glow2); }
    .aw-submit-btn:active { transform: translateY(0); }

    /* ============================================================
       REMINDER ALERT MODAL
       ============================================================ */
    .aw-reminder-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,10,0.9);
      backdrop-filter: blur(12px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .aw-reminder-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .aw-reminder-card {
      background: linear-gradient(160deg, #081a22, #040d14);
      border: 1px solid rgba(0,245,255,0.3);
      border-radius: 24px;
      padding: 30px 24px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 60px rgba(0,245,255,0.2),
        0 0 120px rgba(0,245,255,0.08);
      transform: scale(0.85);
      transition: transform 0.4s cubic-bezier(0.34,1.3,0.64,1);
      position: relative;
      overflow: hidden;
    }

    .aw-reminder-overlay.open .aw-reminder-card {
      transform: scale(1);
    }

    /* Animated ring */
    .aw-reminder-ring {
      width: 90px; height: 90px;
      margin: 0 auto 20px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .aw-reminder-ring::before,
    .aw-reminder-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--aw-cyan);
      animation: aw-ring-expand 2s ease-out infinite;
    }

    .aw-reminder-ring::after {
      animation-delay: 1s;
    }

    @keyframes aw-ring-expand {
      0%   { transform: scale(1);   opacity: 0.8; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    .aw-reminder-icon {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, var(--aw-cyan), var(--aw-green));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 30px var(--aw-glow1);
      animation: aw-shake 0.5s ease-in-out 0.5s 3;
      z-index: 1;
      position: relative;
    }

    @keyframes aw-shake {
      0%,100% { transform: rotate(0deg); }
      25%      { transform: rotate(-10deg); }
      75%      { transform: rotate(10deg); }
    }

    .aw-reminder-headline {
      font-size: 14px;
      color: var(--aw-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .aw-reminder-title {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      margin: 0 0 6px;
      text-shadow: 0 0 20px var(--aw-glow1);
    }

    .aw-reminder-dose {
      font-size: 14px;
      color: var(--aw-green);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .aw-reminder-time {
      font-family: 'Rajdhani', monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--aw-cyan);
      letter-spacing: 3px;
      text-shadow: 0 0 20px var(--aw-glow1);
      margin-bottom: 24px;
    }

    .aw-reminder-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .aw-reminder-btn {
      width: 100%;
      border-radius: 14px;
      padding: 13px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.3px;
    }

    .aw-reminder-btn:active { transform: scale(0.97); }

    .btn-took {
      background: linear-gradient(135deg, var(--aw-green), #00cc6a);
      color: #001a22;
      box-shadow: 0 0 20px rgba(0,255,136,0.3);
    }

    .btn-snooze {
      background: rgba(255,179,71,0.12);
      color: var(--aw-warn);
      border: 1px solid rgba(255,179,71,0.3);
    }

    .btn-dismiss {
      background: rgba(255,77,109,0.08);
      color: var(--aw-danger);
      border: 1px solid rgba(255,77,109,0.2);
      font-size: 13px;
    }

    /* ============================================================
       EMPTY STATE
       ============================================================ */
    .aw-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--aw-muted);
    }

    .aw-empty-icon {
      font-size: 50px;
      display: block;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 10px rgba(0,245,255,0.3));
    }

    .aw-empty-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--aw-text);
      margin-bottom: 6px;
    }

    .aw-empty-sub { font-size: 13px; }

    /* ============================================================
       SNOOZE TOAST
       ============================================================ */
    .aw-toast {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,26,34,0.95);
      border: 1px solid var(--aw-border);
      border-radius: 30px;
      padding: 10px 22px;
      font-size: 13px;
      color: var(--aw-cyan);
      opacity: 0;
      transition: all 0.35s;
      z-index: 300;
      backdrop-filter: blur(20px);
      white-space: nowrap;
      box-shadow: 0 0 20px rgba(0,245,255,0.15);
    }

    .aw-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 380px) {
      .aw-header h1    { font-size: 18px; }
      .aw-next-med-name { font-size: 17px; }
    }
  </style>
</head>
<body>

<!-- ================================================================
     ADWIYATI ROOT — this entire block maps to your "أدويتي" section
     ================================================================ -->
<div class="adwiyati-root" id="adwiyati-root">

  <!-- HEADER -->
  <div class="aw-header">
    <div class="aw-header-title">
      <div class="aw-header-icon">💊</div>
      <div>
        <h1>أدويتي</h1>
        <p class="aw-header-sub">MedChifaGiz · نظام الأدوية الذكي</p>
      </div>
    </div>
    <div class="aw-time-badge" id="aw-live-clock">--:--:--</div>
  </div>

  <!-- NEXT DOSE SECTION -->
  <div class="aw-section">
    <div class="aw-section-label">🔔 الجرعة القادمة</div>
    <div id="aw-next-dose-card">
      <!-- Injected dynamically -->
    </div>
  </div>

  <!-- MED LIST -->
  <div class="aw-section" style="margin-top:20px;">
    <div class="aw-section-label">💉 قائمة الأدوية</div>
    <div class="aw-med-list" id="aw-med-list">
      <!-- Injected dynamically -->
    </div>
  </div>

</div>

<!-- FAB -->
<button class="aw-fab" id="aw-fab-btn" title="إضافة دواء">＋</button>

<!-- ADD MED MODAL -->
<div class="aw-overlay" id="aw-add-overlay">
  <div class="aw-modal">
    <div class="aw-modal-handle"></div>
    <div class="aw-modal-title">💊 <span>إضافة دواء جديد</span></div>

    <div class="aw-form-group">
      <label class="aw-form-label" for="aw-inp-name">اسم الدواء</label>
      <input class="aw-input" id="aw-inp-name" type="text" placeholder="مثال: أموكسيسيلين" autocomplete="off" />
    </div>

    <div class="aw-form-group">
      <label class="aw-form-label" for="aw-inp-dose">الجرعة</label>
      <input class="aw-input" id="aw-inp-dose" type="text" placeholder="مثال: حبة واحدة — 500mg" autocomplete="off" />
    </div>

    <div class="aw-form-group">
      <label class="aw-form-label">ساعة تناول الدواء</label>
      <div class="aw-time-picker-wrap">
        <input class="aw-time-input" id="aw-inp-time" type="time" value="08:00" />
      </div>
      <div class="aw-quick-times">
        <button class="aw-quick-time-btn" data-t="07:00">٧:٠٠</button>
        <button class="aw-quick-time-btn" data-t="08:00">٨:٠٠</button>
        <button class="aw-quick-time-btn" data-t="12:00">١٢:٠٠</button>
        <button class="aw-quick-time-btn" data-t="14:30">١٤:٣٠</button>
        <button class="aw-quick-time-btn" data-t="18:00">١٨:٠٠</button>
        <button class="aw-quick-time-btn" data-t="22:00">٢٢:٠٠</button>
      </div>
    </div>

    <button class="aw-submit-btn" id="aw-submit-btn">✦ إضافة الدواء</button>
  </div>
</div>

<!-- REMINDER MODAL -->
<div class="aw-reminder-overlay" id="aw-reminder-overlay">
  <div class="aw-reminder-card">
    <div class="aw-reminder-ring">
      <div class="aw-reminder-icon">🔔</div>
    </div>
    <p class="aw-reminder-headline">تنبيه الدواء</p>
    <div class="aw-reminder-title" id="aw-rem-name">—</div>
    <div class="aw-reminder-dose" id="aw-rem-dose">—</div>
    <div class="aw-reminder-time" id="aw-rem-time">--:--</div>
    <div class="aw-reminder-actions">
      <button class="aw-reminder-btn btn-took" id="aw-rem-took">✔ أخذته</button>
      <button class="aw-reminder-btn btn-snooze" id="aw-rem-snooze">⏰ ذكرني بعد 10 دقائق</button>
      <button class="aw-reminder-btn btn-dismiss" id="aw-rem-dismiss">✕ تجاهل</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="aw-toast" id="aw-toast"></div>

<!-- ================================================================
     JAVASCRIPT — scoped to adwiyati-root
     Uses localStorage key: medchifa_adwiyati (isolated)
     ================================================================ -->
<script>
(function () {
  'use strict';

  // ── Storage key (isolated from the rest of MedChifaGiz) ──────────
  const STORAGE_KEY = 'medchifa_adwiyati_v2';

  // ── State ─────────────────────────────────────────────────────────
  let meds = [];
  let currentReminder = null; // { medId, snoozed }
  let snoozedTimers = {};     // medId → setTimeout handle

  // ── Load / Save ───────────────────────────────────────────────────
  function loadMeds() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      meds = raw ? JSON.parse(raw) : [];
    } catch (e) {
      meds = [];
    }
  }

  function saveMeds() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(meds));
    } catch (e) {}
  }

  // ── Helpers ───────────────────────────────────────────────────────
  function nowHHMM() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  /** minutes since midnight for HH:MM string */
  function toMinutes(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    return h * 60 + m;
  }

  function minutesUntil(hhmm) {
    const target = toMinutes(hhmm);
    const now    = toMinutes(nowHHMM());
    let diff = target - now;
    if (diff < 0) diff += 1440; // wrap to next day
    return diff;
  }

  function formatCountdown(mins) {
    if (mins <= 0) return '00:00';
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    if (h > 0) return `${h}س ${String(m).padStart(2,'0')}د`;
    return `${String(m).padStart(2,'0')} دقيقة`;
  }

  function uid() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  function getMedStatus(med) {
    const now = nowHHMM();
    const nowMins = toMinutes(now);
    const medMins = toMinutes(med.time);
    if (med.takenToday) return 'taken';
    const diff = nowMins - medMins;
    if (diff > 0 && diff < 60) return 'missed';
    return 'pending';
  }

  // ── Toast ─────────────────────────────────────────────────────────
  function showToast(msg, dur = 3000) {
    const el = document.getElementById('aw-toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), dur);
  }

  // ── Render Next Dose Card ─────────────────────────────────────────
  function renderNextDose() {
    const el = document.getElementById('aw-next-dose-card');
    const upcoming = meds
      .filter(m => !m.takenToday)
      .sort((a, b) => minutesUntil(a.time) - minutesUntil(b.time));

    if (!upcoming.length) {
      el.innerHTML = `
        <div class="aw-no-next">
          <span class="aw-no-next-icon">🎉</span>
          أحسنت! لا توجد جرعات قادمة اليوم
        </div>`;
      return;
    }

    const next = upcoming[0];
    const mins  = minutesUntil(next.time);
    const pct   = Math.max(0, Math.min(100, 100 - (mins / 1440) * 100));

    el.innerHTML = `
      <div class="aw-next-card">
        <div class="aw-next-card-top">
          <div>
            <div class="aw-next-med-name">${esc(next.name)}</div>
            <div class="aw-next-med-dose">💊 ${esc(next.dose)}</div>
          </div>
          <div class="aw-next-time-bubble">
            <span class="time">${next.time}</span>
            <span class="lbl">الموعد</span>
          </div>
        </div>
        <div class="aw-countdown">
          <span class="aw-countdown-label">⏱ الوقت المتبقي:</span>
          <span class="aw-countdown-value" id="aw-cd-val">${formatCountdown(mins)}</span>
        </div>
        <div class="aw-progress-track">
          <div class="aw-progress-fill" id="aw-cd-bar" style="width:${pct}%"></div>
        </div>
        <div class="aw-status-row">
          <div class="aw-status-dot"></div>
          <span class="aw-status-text">في الانتظار — ${upcoming.length} جرعة متبقية اليوم</span>
        </div>
      </div>`;
  }

  // ── Render Med List ───────────────────────────────────────────────
  function renderMedList() {
    const el = document.getElementById('aw-med-list');

    if (!meds.length) {
      el.innerHTML = `
        <div class="aw-empty">
          <span class="aw-empty-icon">💊</span>
          <div class="aw-empty-title">لا توجد أدوية مضافة بعد</div>
          <div class="aw-empty-sub">اضغط ＋ لإضافة دوائك الأول</div>
        </div>`;
      return;
    }

    const sorted = [...meds].sort((a,b) => toMinutes(a.time) - toMinutes(b.time));

    el.innerHTML = sorted.map(med => {
      const status  = getMedStatus(med);
      const chipCls = status === 'taken' ? 'chip-taken' : status === 'missed' ? 'chip-missed' : 'chip-pending';
      const chipLbl = status === 'taken' ? '✓ تم الأخذ' : status === 'missed' ? '✕ فاتك' : '⏳ قادم';
      const badgeLbl = status === 'taken' ? '✓' : status === 'missed' ? '!' : '·';
      return `
        <div class="aw-med-card ${status}" data-id="${med.id}">
          <div class="aw-med-icon-wrap">
            💊
            <span class="aw-med-badge ${status}">${badgeLbl}</span>
          </div>
          <div class="aw-med-info">
            <div class="aw-med-name">${esc(med.name)}</div>
            <div class="aw-med-dose">${esc(med.dose)}</div>
          </div>
          <div class="aw-med-time-col">
            <div class="aw-med-time">${med.time}</div>
            <div class="aw-med-status-chip ${chipCls}">${chipLbl}</div>
          </div>
          <button class="aw-med-delete-btn" data-del="${med.id}" title="حذف">🗑</button>
        </div>`;
    }).join('');

    // Delete listeners
    el.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = btn.dataset.del;
        meds = meds.filter(m => m.id !== id);
        saveMeds();
        render();
      });
    });
  }

  // ── Render All ────────────────────────────────────────────────────
  function render() {
    renderNextDose();
    renderMedList();
  }

  // ── Live Clock ─────────────────────────────────────────────────────
  function tickClock() {
    const d = new Date();
    const t = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    const el = document.getElementById('aw-live-clock');
    if (el) el.textContent = t;

    // Update countdown
    const cdVal = document.getElementById('aw-cd-val');
    const cdBar = document.getElementById('aw-cd-bar');
    const next  = meds.filter(m => !m.takenToday)
                       .sort((a,b) => minutesUntil(a.time) - minutesUntil(b.time))[0];
    if (cdVal && next) {
      const mins = minutesUntil(next.time);
      cdVal.textContent = formatCountdown(mins);
      if (cdBar) {
        const pct = Math.max(0, Math.min(100, 100 - (mins / 1440) * 100));
        cdBar.style.width = pct + '%';
      }
    }
  }

  // ── Alarm Checker ─────────────────────────────────────────────────
  function checkAlarms() {
    const now = nowHHMM();
    meds.forEach(med => {
      if (med.takenToday) return;
      if (med.time === now && !snoozedTimers[med.id + '_firing']) {
        snoozedTimers[med.id + '_firing'] = true;
        fireReminder(med);
      }
    });
    // Reset firing flags at next minute
    const sec = new Date().getSeconds();
    if (sec === 59) {
      Object.keys(snoozedTimers).forEach(k => {
        if (k.endsWith('_firing')) delete snoozedTimers[k];
      });
    }
  }

  // ── Reminder ──────────────────────────────────────────────────────
  function fireReminder(med) {
    currentReminder = med;
    document.getElementById('aw-rem-name').textContent = med.name;
    document.getElementById('aw-rem-dose').textContent = '💊 ' + med.dose;
    document.getElementById('aw-rem-time').textContent = med.time;
    document.getElementById('aw-reminder-overlay').classList.add('open');

    // Native notification (for future app integration)
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('💊 حان وقت دوائك!', {
        body: `${med.name} — ${med.dose}\nالساعة: ${med.time}`,
        icon: '💊'
      });
    }
  }

  function closeReminder() {
    document.getElementById('aw-reminder-overlay').classList.remove('open');
    currentReminder = null;
  }

  // Reminder buttons
  document.getElementById('aw-rem-took').addEventListener('click', () => {
    if (!currentReminder) return;
    const m = meds.find(x => x.id === currentReminder.id);
    if (m) { m.takenToday = true; saveMeds(); render(); }
    closeReminder();
    showToast('✅ تم تسجيل الجرعة — أحسنت!');
  });

  document.getElementById('aw-rem-snooze').addEventListener('click', () => {
    if (!currentReminder) return;
    const medId = currentReminder.id;
    closeReminder();
    showToast('⏰ سيُذكِّرك النظام بعد 10 دقائق');
    snoozedTimers[medId] = setTimeout(() => {
      const m = meds.find(x => x.id === medId);
      if (m && !m.takenToday) fireReminder(m);
      delete snoozedTimers[medId];
    }, 10 * 60 * 1000);
  });

  document.getElementById('aw-rem-dismiss').addEventListener('click', () => {
    closeReminder();
    showToast('تم التجاهل — لا تنسَ دواءك 💙');
  });

  // ── Add Med Modal ─────────────────────────────────────────────────
  document.getElementById('aw-fab-btn').addEventListener('click', () => {
    document.getElementById('aw-add-overlay').classList.add('open');
    document.getElementById('aw-inp-name').focus();
  });

  document.getElementById('aw-add-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('aw-add-overlay'))
      document.getElementById('aw-add-overlay').classList.remove('open');
  });

  // Quick time buttons
  document.querySelectorAll('.aw-quick-time-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('aw-inp-time').value = btn.dataset.t;
    });
  });

  document.getElementById('aw-submit-btn').addEventListener('click', () => {
    const name = document.getElementById('aw-inp-name').value.trim();
    const dose = document.getElementById('aw-inp-dose').value.trim();
    const time = document.getElementById('aw-inp-time').value;

    if (!name) { showToast('⚠ الرجاء إدخال اسم الدواء'); return; }
    if (!dose) { showToast('⚠ الرجاء إدخال الجرعة');    return; }
    if (!time) { showToast('⚠ الرجاء تحديد الساعة');    return; }

    const med = { id: uid(), name, dose, time, takenToday: false, createdAt: Date.now() };
    meds.push(med);
    saveMeds();
    render();

    document.getElementById('aw-inp-name').value = '';
    document.getElementById('aw-inp-dose').value = '';
    document.getElementById('aw-inp-time').value = '08:00';
    document.getElementById('aw-add-overlay').classList.remove('open');
    showToast(`✅ تمت إضافة ${name} — موعده ${time}`);

    // Request notification permission
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  });

  // ── Daily Reset (midnight) ────────────────────────────────────────
  function checkDailyReset() {
    const today = new Date().toDateString();
    const lastDay = localStorage.getItem('medchifa_adwiyati_day');
    if (lastDay !== today) {
      meds.forEach(m => { m.takenToday = false; });
      saveMeds();
      localStorage.setItem('medchifa_adwiyati_day', today);
    }
  }

  // ── Escape HTML ───────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── Init ──────────────────────────────────────────────────────────
  loadMeds();
  checkDailyReset();
  render();

  setInterval(tickClock,   1000);
  setInterval(checkAlarms, 1000);
  tickClock();

  // Seed demo meds if empty (remove in production)
  if (meds.length === 0) {
    meds = [
      { id: uid(), name: 'أموكسيسيلين', dose: '500mg — حبة واحدة',  time: '08:00', takenToday: false, createdAt: Date.now() },
      { id: uid(), name: 'فيتامين D3',  dose: 'قطرتان',              time: '14:30', takenToday: false, createdAt: Date.now() },
      { id: uid(), name: 'أسبرين',      dose: '100mg — نصف حبة',    time: '22:00', takenToday: false, createdAt: Date.now() },
    ];
    saveMeds();
    render();
  }

})();
</script>

</body>
</html>
